{% extends "base.html" %}

{% block content %}
<div style="padding-top: 120px; padding-bottom: 80px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card-custom">
                    <div class="text-center mb-4">
                        <div class="feature-icon mx-auto mb-3" style="width: 60px; height: 60px;">
                            <i class="fas fa-user-plus"></i>
                        </div>
                        <h2 class="fw-bold" style="color: var(--primary-color);">Create Account</h2>
                        <p style="color: var(--text-light);">Join our medical AI platform</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                            <i class="fas fa-rocket me-2"></i>Create Account
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="mb-0" style="color: var(--text-light);">
                            Already have an account? 
                            <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold" 
                               style="color: var(--secondary-color);">Sign in here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
