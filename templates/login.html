{% extends "base.html" %}

{% block content %}
<div style="padding-top: 120px; padding-bottom: 80px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card-custom">
                    <div class="text-center mb-4">
                        <div class="feature-icon mx-auto mb-3" style="width: 60px; height: 60px;">
                            <i class="fas fa-user-md"></i>
                        </div>
                        <h2 class="fw-bold" style="color: var(--primary-color);">Welcome Back</h2>
                        <p style="color: var(--text-light);">Sign in to your account</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="fas fa-user text-muted"></i>
                                </span>
                                <input type="text" class="form-control border-start-0" 
                                       id="username" name="username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="fas fa-lock text-muted"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" 
                                       id="password" name="password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="mb-0" style="color: var(--text-light);">
                            Don't have an account? 
                            <a href="{{ url_for('signup') }}" class="text-decoration-none fw-semibold" 
                               style="color: var(--secondary-color);">Sign up here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
